services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: movie-revenue-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: movie-revenue-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
